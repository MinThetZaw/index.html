*{box-sizing:border-box;margin:0;padding:0}

.nav-item:hover{background:var(--color-background-primary)}
.nav-item.active{background:var(--color-background-primary);color:var(--color-text-primary);font-weight:500}
.nav-item i{font-size:16px;opacity:.7}
.nav-item.active i{opacity:1}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.topbar{padding:12px 20px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:space-between}
.topbar-title{font-size:15px;font-weight:500}
.topbar-right{display:flex;align-items:center;gap:10px}
.badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500}
.badge-info{background:var(--color-background-info);color:var(--color-text-info)}
.badge-warn{background:var(--color-background-warning);color:var(--color-text-warning)}
.badge-danger{background:var(--color-background-danger);color:var(--color-text-danger)}
.badge-success{background:var(--color-background-success);color:var(--color-text-success)}
.content{flex:1;padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:16px}
.metric-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
.metric{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px 14px}
.metric-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:4px}
.metric-value{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.metric-sub{font-size:11px;color:var(--color-text-secondary);margin-top:3px}
.metric-danger .metric-value{color:var(--color-text-danger)}
.metric-success .metric-value{color:var(--color-text-success)}
.metric-warn .metric-value{color:var(--color-text-warning)}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:16px}
.card-title{font-size:13px;font-weight:500;color:var(--color-text-secondary);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.invoice-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:13px}
.invoice-row:last-child{border-bottom:none}
.inv-id{color:var(--color-text-secondary);font-size:12px}
.inv-amount{font-weight:500}
.aging-bar{display:flex;gap:2px;height:8px;border-radius:4px;overflow:hidden;margin-bottom:8px}
.aging-seg{height:100%;transition:flex .3s}
.aging-legend{display:flex;gap:12px;font-size:11px;color:var(--color-text-secondary)}

.action-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;font-size:13px;border-radius:var(--border-radius-md);cursor:pointer;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);transition:background .15s}

.alert-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--border-radius-md);font-size:13px;background:var(--color-background-warning);color:var(--color-text-warning);border:0.5px solid var(--color-border-warning)}
.page{display:none;flex-direction:column;gap:16px}
.page.active{display:flex}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:8px 10px;text-align:left;font-size:11px;font-weight:500;color:var(--color-text-secondary);border-bottom:0.5px solid var(--color-border-tertiary);white-space:nowrap}
td{padding:8px 10px;border-bottom:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary)}
tr:last-child td{border-bottom:none}
.pill{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.pill-danger{background:var(--color-background-danger);color:var(--color-text-danger)}
.pill-warn{background:var(--color-background-warning);color:var(--color-text-warning)}
.pill-success{background:var(--color-background-success);color:var(--color-text-success)}
.pill-info{background:var(--color-background-info);color:var(--color-text-info)}
.flow-steps{display:flex;flex-direction:column;gap:0}

.flow-step-num{width:28px;height:28px;min-width:28px;border-radius:50%;background:#185FA5;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500}
.flow-step-body{flex:1}
.flow-step-title{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.flow-step-desc{font-size:12px;color:var(--color-text-secondary);margin-top:2px}
.flow-connector{width:28px;display:flex;justify-content:center;margin:-4px 0}

.arch-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.arch-layer{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px}
.arch-layer-title{font-size:11px;font-weight:500;color:var(--color-text-secondary);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.arch-node{display:flex;align-items:center;gap:6px;padding:5px 8px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);font-size:12px;margin-bottom:4px}
.arch-node i{font-size:14px;color:var(--color-text-secondary)}
.qr-box{width:120px;height:120px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);display:flex;align-items:center;justify-content:center;border:0.5px solid var(--color-border-tertiary)}
.qr-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;padding:12px}
.qr-cell{height:10px;border-radius:1px}
.section-tag{font-size:11px;color:var(--color-text-tertiary);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.tab-row{display:flex;gap:4px;border-bottom:0.5px solid var(--color-border-tertiary);margin-bottom:16px}
.tab{padding:8px 14px;font-size:13px;color:var(--color-text-secondary);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-0.5px}
.tab.active{color:var(--color-text-primary);border-bottom-color:#185FA5;font-weight:500}

function buildNav(role) {
  const r = roles[role];
  const nav = document.getElementById('nav');
  nav.innerHTML = '<div class="nav-section">Navigation</div>' + r.nav.map((n,i)=>`<div class="nav-item${i===0?' active':''}" data-page="${n.page}" onclick="nav('${n.page}',this)"><i class="ti ${n.icon}" aria-hidden="true"></i>${n.label}</div>`).join('');
}

function nav(page, el) {
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  if(el) el.classList.add('active');
  else {
    const found = document.querySelector(`[data-page="${page}"]`);
    if(found){found.classList.add('active');}
  }
  const content = document.getElementById('mainContent');
  const fn = pages[page];
  content.innerHTML = fn ? fn() : '<div style="padding:20px;color:var(--color-text-secondary)">Page not found.</div>';
  const titleMap = {};
  const curRole = document.getElementById('roleSelect').value;
  roles[curRole].nav.forEach(n=>{titleMap[n.page]=n.label;});
  document.getElementById('pageTitle').textContent = titleMap[page]||page;
  if(window.Chart && document.getElementById('kpiChart')) {
    setTimeout(()=>{
      new Chart(document.getElementById('kpiChart'),{type:'bar',data:{labels:['Jan','Feb','Mar','Apr','May','Jun'],datasets:[{label:'Collected (₭M)',data:[310,295,340,320,308,312],backgroundColor:'#185FA5'},{label:'Target',data:[350,350,350,350,350,350],type:'line',borderColor:'#E24B4A',backgroundColor:'transparent',borderWidth:2,pointRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>v+'M'}}}}});
    },100);
  }
}

function switchRole(role) {
  const r = roles[role];
  document.getElementById('roleTag').textContent = r.tag;
  document.getElementById('roleTag').className = 'badge '+r.tagClass;
  document.getElementById('pageUser').textContent = r.user;
  document.getElementById('userAvatar').textContent = r.avatar;
  buildNav(role);
  const firstPage = roles[role].nav[0].page;
  nav(firstPage, document.querySelector('.nav-item'));
}

buildNav('merchant');
nav('merchantDash', document.querySelector('.nav-item'));
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
